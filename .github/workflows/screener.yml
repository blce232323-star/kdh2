name: 주식 패턴 스크리너
 
on:
  schedule:
    - cron: '0,30 0-6 * * 1-5'
  workflow_dispatch:
 
jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install requests pykrx
      - name: 스크리너 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python screener.py
